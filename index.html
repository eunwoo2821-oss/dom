<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>행성 이동 시간 시뮬레이터</title>
<style>
body { font-family: Arial; background: #0b0f2a; color: white; margin:0; }
.container { display: flex; height: 100vh; }
.left { width: 50%; padding: 20px; }
.right { width: 50%; display:flex; justify-content:center; align-items:center; }
select, button { padding: 10px; margin: 10px; font-size: 16px; }
.item { margin: 20px 0; }
.bar { height: 30px; background: #222; border-radius: 20px; overflow: hidden; }
.fill { height: 100%; width: 0%; display:flex; align-items:center; padding-left:10px; transition: width 2s ease; }
.walk { background: #4caf50; }
.car { background: #2196f3; }
.plane { background: #ff9800; }
.light { background: #e91e63; }
.planet-img { width: 300px; }
</style>
</head>
<body>
<div class="container">

<div class="left">
<h2>🚀 이동 시간 (애니메이션)</h2>

<select id="planet" onchange="updatePlanet()">
<option value="57900000" data-img="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg">수성</option>
<option value="108200000" data-img="https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg">금성</option>
<option value="149600000" data-img="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">지구</option>
<option value="227900000" data-img="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg">화성</option>
<option value="778500000" data-img="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg">목성</option>
<option value="1433000000" data-img="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg">토성</option>
<option value="2871000000" data-img="https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg">천왕성</option>
<option value="4495000000" data-img="https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg">해왕성</option>
</select>

<button onclick="calculate()">출발 🚀</button>

<div id="result">
<div class="item">🚶 걷기<div class="bar"><div id="walkBar" class="fill walk"></div></div></div>
<div class="item">🚗 자동차<div class="bar"><div id="carBar" class="fill car"></div></div></div>
<div class="item">✈️ 비행기<div class="bar"><div id="planeBar" class="fill plane"></div></div></div>
<div class="item">⚡ 광속<div class="bar"><div id="lightBar" class="fill light"></div></div></div>
</div>
</div>

<div class="right">
<img id="planetImg" class="planet-img" src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div>

</div>

<script>
function formatTime(hours) {
    let years = Math.floor(hours / (24 * 365));
    let days = Math.floor((hours % (24 * 365)) / 24);
    return `${years}년 ${days}일`;
}

function updatePlanet() {
    const select = document.getElementById('planet');
    const img = select.options[select.selectedIndex].getAttribute('data-img');
    document.getElementById('planetImg').src = img;
}

function calculate() {
    const distance = document.getElementById('planet').value;

    const walk = distance / 5;
    const car = distance / 100;
    const plane = distance / 900;
    const light = distance / 1079252848.8;

    const max = Math.max(walk, car, plane, light);

    document.getElementById('walkBar').style.width = (walk/max*100) + "%";
    document.getElementById('carBar').style.width = (car/max*100) + "%";
    document.getElementById('planeBar').style.width = (plane/max*100) + "%";
    document.getElementById('lightBar').style.width = (light/max*100) + "%";

    document.getElementById('walkBar').innerText = formatTime(walk);
    document.getElementById('carBar').innerText = formatTime(car);
    document.getElementById('planeBar').innerText = formatTime(plane);
    document.getElementById('lightBar').innerText = light.toFixed(6) + "시간";
}
</script>

</body>
</html>
