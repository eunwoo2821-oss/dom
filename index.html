<!-- 기존 animate 함수 부분을 이걸로 교체 -->

<script>

let animationM = 0;

/*
  행성 궤도 흔적 저장
*/

const trail = [];

function animate(){

  if(playing){

    /*
      시간 증가
      M이 시간 역할
    */

    animationM += 0.4;

    mInput.value = animationM % 360;

    const a = Number(aInput.value);
    const e = Number(eInput.value);

    const calc = calculate(a,e,animationM);

    /*
      현재 행성 위치 계산
    */

    const rect = canvas.getBoundingClientRect();

    const w = rect.width;
    const h = rect.height;

    const cx = w/2;
    const cy = h/2;

    const scale = 1.6;

    const drawA = a * scale;
    const drawB = a * Math.sqrt(1-e*e) * scale;

    const x = drawA * (Math.cos(calc.E)-e);
    const y = drawB * Math.sin(calc.E);

    const px = cx + x;
    const py = cy + y;

    /*
      궤도 흔적 저장
    */

    trail.push({x:px,y:py});

    /*
      흔적 길이 제한
    */

    if(trail.length > 250){
      trail.shift();
    }

    update();

    /*
      흔적 그리기
    */

    ctx.beginPath();

    for(let i=0;i<trail.length;i++){

      const p = trail[i];

      const alpha = i / trail.length;

      ctx.fillStyle = `rgba(96,165,250,${alpha})`;

      ctx.beginPath();
      ctx.arc(p.x,p.y,2,0,Math.PI*2);
      ctx.fill();
    }
  }

  requestAnimationFrame(animate);
}

animate();

</script>
