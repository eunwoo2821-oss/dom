<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>행성 이동 시간 시뮬레이터</title>
<style>
body { font-family: Arial; text-align: center; background: #0b0f2a; color: white; }
select, button { padding: 10px; margin: 10px; font-size: 16px; }
.result { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>
<h1>🌌 행성 이동 시간 시뮬레이터</h1>

<select id="planet">
<option value="57900000">수성</option>
<option value="108200000">금성</option>
<option value="149600000">지구</option>
<option value="227900000">화성</option>
<option value="778500000">목성</option>
<option value="1433000000">토성</option>
<option value="2871000000">천왕성</option>
<option value="4495000000">해왕성</option>
</select>

<br>
<button onclick="calculate()">계산하기</button>

<div class="result" id="result"></div>

<script>
function formatTime(hours) {
    let years = Math.floor(hours / (24 * 365));
    let days = Math.floor((hours % (24 * 365)) / 24);
    let hrs = Math.floor(hours % 24);
    return `${years}년 ${days}일 ${hrs}시간`;
}

function calculate() {
    const distance = document.getElementById('planet').value; // km

    const walkSpeed = 5; // km/h
    const carSpeed = 100; // km/h
    const planeSpeed = 900; // km/h
    const lightSpeed = 1079252848.8; // km/h

    let walkTime = distance / walkSpeed;
    let carTime = distance / carSpeed;
    let planeTime = distance / planeSpeed;
    let lightTime = distance / lightSpeed;

    document.getElementById('result').innerHTML = `
    🚶 걷기: ${formatTime(walkTime)}<br>
    🚗 자동차: ${formatTime(carTime)}<br>
    ✈️ 비행기: ${formatTime(planeTime)}<br>
    ⚡ 광속: ${lightTime.toFixed(6)} 시간
    `;
}
</script>

</body>
</html>
