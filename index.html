<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>엔진 시뮬레이터</title>
<style>
body {
  margin:0;
  background:#f0f0f0;
  font-family:sans-serif;
  text-align:center;
}
canvas {
  background:#e5e5e5;
  margin-top:20px;
  border-radius:12px;
}
.controls {
  margin-top:15px;
}
button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#333;
  color:white;
  cursor:pointer;
}
button:hover { background:#555; }
</style>
</head>
<body>

<h2 id="engineType">V6 엔진</h2>
<canvas id="engineCanvas" width="800" height="400"></canvas>

<div class="controls">
  <button onclick="changeCyl(-1)">- 기통</button>
  <button onclick="changeCyl(1)">+ 기통</button>
  <br>
  RPM: <span id="rpmVal">1</span>
  <input type="range" min="1" max="10" value="1" id="rpmSlider">
</div>

<script>
const canvas = document.getElementById('engineCanvas');
const ctx = canvas.getContext('2d');

let types = [6,8,10,12];
let index = 0;
let rpm = 1;
let angle = 0;

const slider = document.getElementById('rpmSlider');
slider.oninput = () => {
  rpm = slider.value;
  document.getElementById('rpmVal').innerText = rpm;
};

function changeCyl(dir){
  index += dir;
  if(index < 0) index = types.length-1;
  if(index >= types.length) index = 0;
  document.getElementById('engineType').innerText = "V" + types[index] + " 엔진";
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  let cyl = types[index];
  let spacing = 80;
  let startX = canvas.width/2 - (cyl/2 * spacing)/2;
  
  for(let i=0;i<cyl;i++){
    let phase = (i % 2 === 0) ? 0 : Math.PI;
    let y = 200 + Math.sin(angle + phase) * 40;
    let x = startX + i * spacing;
    
    // 피스톤
    ctx.fillStyle = '#c0c0c0';
    ctx.fillRect(x, y, 40, 60);
    
    // 커넥팅로드
    ctx.strokeStyle = '#888';
    ctx.beginPath();
    ctx.moveTo(x+20, y+60);
    ctx.lineTo(x+20, 300);
    ctx.stroke();
  }
  
  // 크랭크축
  ctx.fillStyle = '#666';
  ctx.fillRect(0,300,800,20);
}

function animate(){
  angle += 0.05 * rpm;
  draw();
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
